<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-header">
        <h1>My Movie Finder</h1>
        <div class="search-area">
            <input type="text" id="movie-searchbox" placeholder="Search for a movie...">
            <button id="find-btn">Search</button>
        </div>

        <div class="filters">
            <select id="category-dropdown">
                <option value="all">All Content</option>
                <option value="movie">Movies</option>
                <option value="tv_series">TV Shows</option>
            </select>

            <select id="sorting-dropdown">
                <option value="default">Sort by...</option>
                <option value="az">A to Z</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
            </select>
        </div>
    </header>

    <main>
        <div id="loader-div" style="display: none;">
            <div class="spinning-circle"></div>
            <p id="loader-text">Loading...</p>
        </div>

        <div id="error-alert" style="display: none;"></div>

        <h2>Search Results</h2>
        <div id="results-area">
            <p class="no-data-text">Enter a movie to search.</p>
        </div>

        <hr class="separator">

        <h2>My Watchlist</h2>
        <div id="saved-movies-area"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
